          fill="#15803d"
          stroke="white"
          stroke-width="2"/>

    <!-- Halfway line -->
    <line x1="32" y1="10" x2="32" y2="54"
          stroke="white"
          stroke-width="1.5"/>

    <!-- Centre circle -->
