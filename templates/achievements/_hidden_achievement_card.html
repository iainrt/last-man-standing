<div class="rounded-xl border-2 border-dashed border-slate-300 bg-slate-50 p-5 shadow-sm">

    <div class="flex items-start justify-between gap-4">

        <div>
            <div class="text-3xl text-slate-400">
                ❓
            </div>

            <h3 class="mt-2 text-xl font-semibold text-slate-700">
                Unknown Achievement
            </h3>
        </div>

        <span class="rounded-full bg-slate-200 px-3 py-1 text-sm font-medium text-slate-600">
            Hidden
        </span>

    </div>

    <p class="mt-4 text-sm italic text-slate-600">
        {% if card.achievement.clue %}
            {{ card.achievement.clue }}
        {% else %}
            Keep playing to discover this achievement.
        {% endif %}
    </p>

    <div class="mt-4">
        <div class="h-3 overflow-hidden rounded-full bg-slate-200">
            <div
                class="h-full rounded-full bg-slate-500"
                style="width: {{ card.percentage }}%;"
            ></div>
        </div>
    </div>

</div>
