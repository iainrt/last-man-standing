{% extends "base.html" %}

{% block content %}

<h1 class="mb-6 text-3xl font-bold text-slate-900">Edit Profile</h1>

<form method="post">
    {% csrf_token %}
    
    {% for field in form %}
        <div>
            <label
                for="{{ field.id_for_label }}"
                class="mb-1 block text-sm font-medium text-slate-700"
            >
                {{ field.label }}
            </label>

            {{ field }}

            {% for error in field.errors %}
                <p class="mt-1 text-sm text-red-600">
                    {{ error }}
                </p>
            {% endfor %}
        </div>
    {% endfor %}

    <br>

    <button type="submit"
            class="inline-block rounded-lg bg-slate-900 px-4 py-2 font-medium text-white hover:bg-slate-700">
        Save Changes
    </button>
</form>

{% endblock %}
