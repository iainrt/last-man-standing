{% extends "base.html" %}

{% block content %}

<h1>Register</h1>

<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div>
            <label
                for="{{ field.id_for_label }}"
                class="mb-1 block text-sm font-medium text-slate-700"
            >
                {{ field.label }}
            </label>

            {{ field }}

            {% for error in field.errors %}
                <p class="mt-1 text-sm text-red-600">
                    {{ error }}
                </p>
            {% endfor %}
        </div>
    {% endfor %}

    <button type="submit">
        Create account
    </button>
</form>

{% endblock %}
