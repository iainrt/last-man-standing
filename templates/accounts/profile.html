{% extends "base.html" %}

{% block content %}

<h1>Profile</h1>

<p>
    <a href="{% url 'edit_profile' %}">
        Edit Profile
    </a>
</p>

<p>
    <a href="{% url 'password_change' %}">
        Change Password
    </a>
</p>

<p>
    Username: {{ user.username }}
</p>

<p>
    Screen Name: {{ profile.screen_name }}
</p>

<p>
    Favourite Team:
    {{ profile.favourite_team|default:"Not set" }}
</p>

{% endblock %}
