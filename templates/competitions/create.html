{% extends "base.html" %}

{% block content %}

<div class="mx-auto max-w-xl">

    <div class="rounded-xl bg-white p-6 shadow">

        <h1 class="mb-6 text-3xl font-bold text-slate-900">
            Create Competition
        </h1>

        <p class="text-sm text-slate-500">
            Set up a new Last Man Standing competition.
        </p>

        <form method="post" class="mt-6 space-y-4">
            {% csrf_token %}

            {% for field in form %}
                <div>
                    <label
                        for="{{ field.id_for_label }}"
                        class="mb-1 block text-sm font-medium text-slate-700"
                    >
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% for error in field.errors %}
                        <p class="mt-1 text-sm text-red-600">
                            {{ error }}
                        </p>
                    {% endfor %}
                </div>
            {% endfor %}

            <button
                type="submit"
                class="w-full rounded-lg bg-slate-900 px-4 py-2 font-medium text-white hover:bg-slate-700"
            >
                Create Competition
            </button>
        </form>

    </div>

    <p class="mt-4 text-center">
        <a
            href="{% url 'competition_list' %}"
            class="text-sm font-medium text-slate-700 hover:text-slate-900"
        >
            Back to Competitions
        </a>
    </p>

</div>

{% endblock %}
