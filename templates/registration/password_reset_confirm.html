{% extends "base.html" %}

{% block content %}

<h1>Set New Password</h1>

{% if validlink %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            Set New Password
        </button>
    </form>

{% else %}

    <p>
        This password reset link is invalid or has expired.
    </p>

    <p>
        <a href="{% url 'password_reset' %}">
            Request a new reset link
        </a>
    </p>

{% endif %}

{% endblock %}
