{% extends "base.html" %}

{% block content %}

<h1>Change Password</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit"
        class="rounded-lg bg-slate-900 px-4 py-2 font-medium text-white hover:bg-slate-700">
        Change Password
    </button>
</form>

<p>
    <a href="{% url 'profile' %}"
        class="text-sm font-medium text-slate-700 hover:text-slate-900"
        >
        Back to Profile
    </a>
</p>

{% endblock %}
