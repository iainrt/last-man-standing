{% extends "base.html" %}

{% block content %}

<h1>Reset Password</h1>

<p>Enter your email address and we'll send you a password reset link.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit"
            class="rounded-lg bg-slate-900 px-4 py-2 font-medium text-white hover:bg-slate-700">
        Send Reset Link
    </button>
</form>

{% endblock %}
