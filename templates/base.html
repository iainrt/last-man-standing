<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Man Standing</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-slate-100 text-slate-900">

    <header class="bg-slate-900 text-white shadow">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
            <a href="{% url 'home' %}" class="text-lg font-bold">
                Last Man Standing
            </a>

            <nav class="flex items-center gap-4 text-sm">
                <a href="{% url 'home' %}" class="hover:text-emerald-300">
                    Home
                </a>

                {% if user.is_authenticated %}
                    <a href="{% url 'competition_list' %}" class="hover:text-emerald-300">
                        Competitions
                    </a>

                    <a href="{% url 'profile' %}" class="hover:text-emerald-300">
                        Profile
                    </a>

                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="hover:text-emerald-300">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="hover:text-emerald-300">
                        Login
                    </a>

                    <a href="{% url 'register' %}" class="hover:text-emerald-300">
                        Register
                    </a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-6">

        {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                    <div class="rounded-lg border border-slate-300 bg-white px-4 py-3 shadow-sm">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}

    </main>

</body>
</html>
