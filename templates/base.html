<!DOCTYPE html>
<html>
<head>
    <title>Last Man Standing</title>
</head>
<body>

<nav>
    <a href="/">Home</a>

    {% if user.is_authenticated %}
        <a href="{% url 'profile' %}">
            Profile
        </a>

        <form
            method="post"
            action="{% url 'logout' %}"
            style="display:inline;"
        >
            {% csrf_token %}
            <button type="submit">
                Logout
            </button>
        </form>

    {% else %}
        <a href="{% url 'login' %}">
            Login
        </a>
    {% endif %}
</nav>

<hr>

{% block content %}
{% endblock %}

</body>
</html>
