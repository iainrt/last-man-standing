{% extends "base.html" %}

{% block content %}

<h1>Make Pick</h1>

<p>
    <strong>Competition:</strong>
    {{ competition.name }}
</p>

<p>
    <strong>Gameweek:</strong>
    Gameweek {{ competition_gameweek.gameweek.number }}
</p>

<p>
    <strong>Deadline:</strong>
    {{ competition_gameweek.deadline|date:"D d M Y H:i" }}
</p>

<hr>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Save Pick
    </button>
</form>

<p>
    <a href="{% url 'competition_detail' competition.id %}">
        Back to Competition
    </a>
</p>

{% endblock %}
